version: '3.8'

volumes:
  orchestrator-data:
    name: orchestrator-data
  orchestrator-secrets:
    name: orchestrator-secrets
  orchestrator-backups:
    name: orchestrator-backups

services:
  orchestrator:
    image: agentscope/qwenpaw:latest
    container_name: orchestrator
    restart: always
    ports:
      - "127.0.0.1:8088:8088"
    # environment:
    #   - ORCHESTRATOR_AUTH_ENABLED=true
    #   - ORCHESTRATOR_AUTH_USERNAME=admin
    #   - ORCHESTRATOR_AUTH_PASSWORD=yourpassword
    volumes:
      - orchestrator-data:/app/working
      - orchestrator-secrets:/app/working.secret
      - orchestrator-backups:/app/working.backups
